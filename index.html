<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, touch-action: none">
    <title>B-52 против Амиго</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #0a0a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        canvas {
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: none;
            touch-action: none;
        }
        #comic-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        #comic-img {
            max-width: 100vw;
            max-height: 90vh;
            object-fit: contain;
        }
        .comic-controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 1.2rem;
            background: #ff6600;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            touch-action: manipulation;
        }
        button:active {
            background: #cc5500;
        }
        #start-game-btn {
            margin-top: 20px;
            background: #00aa44;
            font-size: 1.5rem;
            padding: 15px 40px;
        }
        #message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: yellow;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 200;
            font-size: 1.2rem;
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
        }
        @media (max-width: 768px) {
            #message { font-size: 1rem; white-space: normal; top: 10px; }
            button { padding: 8px 16px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div id="comic-container">
    <img id="comic-img" src="comic1.png" alt="Comic" style="max-width: 100%; max-height: 80vh;">
    <div class="comic-controls">
        <button id="prev-btn" disabled>◀ Назад</button>
        <button id="next-btn">Вперед ▶</button>
    </div>
    <button id="start-game-btn" style="display:none;">⚡ Начать игру ⚡</button>
</div>
<canvas id="gameCanvas" width="1200" height="700" style="display:none; touch-action: none;"></canvas>
<div id="message" style="display:none;"></div>

<script>
    (function(){
        // ---------------------- КОМИКС ----------------------
        let currentPage = 1;
        const totalComics = 7;
        const comicImg = document.getElementById('comic-img');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const startBtn = document.getElementById('start-game-btn');
        const comicContainer = document.getElementById('comic-container');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const messageDiv = document.getElementById('message');

        function updateComic() {
            comicImg.src = `comic${currentPage}.png`;
            prevBtn.disabled = currentPage === 1;
            if (currentPage === totalComics) {
                nextBtn.style.display = 'none';
                startBtn.style.display = 'inline-block';
            } else {
                nextBtn.style.display = 'inline-block';
                startBtn.style.display = 'none';
            }
        }
        nextBtn.onclick = () => { if (currentPage < totalComics) { currentPage++; updateComic(); } };
        prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; updateComic(); } };
        
        startBtn.onclick = () => {
            comicContainer.style.display = 'none';
            canvas.style.display = 'block';
            messageDiv.style.display = 'block';
            initGame();
        };
        updateComic();

        // ---------------------- ИГРОВОЙ ДВИЖОК ----------------------
        let game = null;
        
        class Vec2 { constructor(x,y){ this.x=x; this.y=y; } }
        
        class GameObject {
            constructor(x,y,w,h){
                this.x=x; this.y=y; this.w=w; this.h=h;
            }
            getBounds(){ return {x:this.x, y:this.y, w:this.w, h:this.h}; }
        }
        
        class Player extends GameObject {
            constructor(x,y){
                super(x,y,40,40);
                this.speed = 4;
                this.battery = 100;
                this.maxBattery = 100;
                this.megaCharge = false;
                this.shootCooldown = 0;
                this.dir = {x:0,y:0};
                this.animFrame = 0;
            }
            update(){
                if(!this.megaCharge && this.battery > 0){
                    let drain = (Math.abs(this.dir.x)+Math.abs(this.dir.y)) * 0.3;
                    this.battery = Math.max(0, this.battery - drain);
                }
                if(!this.megaCharge && this.battery <= 0) return false; // dead
                let moveSpeed = this.speed;
                if(!this.megaCharge && this.battery < 30) moveSpeed *= 0.4;
                this.x += this.dir.x * moveSpeed;
                this.y += this.dir.y * moveSpeed;
                // границы карты
                this.x = Math.max(50, Math.min(game.mapWidth-50, this.x));
                this.y = Math.max(50, Math.min(game.mapHeight-50, this.y));
                if(this.shootCooldown > 0) this.shootCooldown--;
                this.animFrame++;
                return true;
            }
            draw(ctx, camera){
                let screen = {x: this.x - camera.x, y: this.y - camera.y};
                ctx.fillStyle = "#55aaff";
                ctx.shadowBlur = 0;
                ctx.fillRect(screen.x-20, screen.y-20, 40, 40);
                ctx.fillStyle = "#ffffff";
                ctx.font = "20px monospace";
                ctx.fillText("B-52", screen.x-15, screen.y-25);
                // анимация шагов
                if(Math.abs(this.dir.x)+Math.abs(this.dir.y) > 0.1){
                    ctx.fillStyle = "#ffaa44";
                    ctx.beginPath();
                    ctx.arc(screen.x + (this.animFrame%10<5 ? -12 : 12), screen.y+15, 5, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            shoot(){
                if(this.shootCooldown > 0) return false;
                this.shootCooldown = 15;
                return true;
            }
        }
        
        class Amigo extends GameObject {
            constructor(x,y){
                super(x,y,40,40);
                this.speed = 2.2;
                this.waypoints = [];
                this.currentWp = 0;
                this.caught = false;
                this.speedBoost = 1.0;
                this.hits = 0;
                // маршрут к офису (координаты примерные)
                this.waypoints = [
                    {x: 800, y: 500}, {x: 1500, y: 800}, {x: 2200, y: 1200},
                    {x: 3000, y: 1800}, {x: 3600, y: 2200}, {x: 3800, y: 2600}
                ];
            }
            update(){
                if(this.caught) return;
                let target = this.waypoints[this.currentWp];
                let dx = target.x - this.x;
                let dy = target.y - this.y;
                let dist = Math.hypot(dx,dy);
                if(dist < 20){
                    this.currentWp = (this.currentWp+1) % this.waypoints.length;
                    if(this.currentWp === 0) this.caught = true; // дошел до офиса
                    return;
                }
                let step = this.speed * this.speedBoost;
                let angle = Math.atan2(dy,dx);
                this.x += Math.cos(angle) * step;
                this.y += Math.sin(angle) * step;
                this.x = Math.max(30, Math.min(game.mapWidth-30, this.x));
                this.y = Math.max(30, Math.min(game.mapHeight-30, this.y));
            }
            draw(ctx, camera){
                if(this.caught) return;
                let screen = {x: this.x - camera.x, y: this.y - camera.y};
                ctx.fillStyle = "#dd6644";
                ctx.fillRect(screen.x-20, screen.y-20, 40, 40);
                ctx.fillStyle = "#ffcc00";
                ctx.font = "16px monospace";
                ctx.fillText("🤠 Amigo", screen.x-22, screen.y-28);
                // шляпа
                ctx.fillStyle = "#aa6644";
                ctx.fillRect(screen.x-25, screen.y-35, 50, 12);
            }
            hit(){
                this.hits++;
                this.speedBoost = Math.min(2.5, 1.0 + this.hits * 0.2);
                return true; // падает шарик
            }
        }
        
        class LampPost extends GameObject {
            constructor(x,y, isSpecial=false){
                super(x,y,30,50);
                this.isSpecial = isSpecial; // трансформаторная будка
                this.charged = false;
            }
            draw(ctx, camera){
                let screen = {x: this.x - camera.x, y: this.y - camera.y};
                if(this.isSpecial){
                    ctx.fillStyle = "#8b4513";
                    ctx.fillRect(screen.x-20, screen.y-30, 40, 50);
                    ctx.fillStyle = "#ffaa00";
                    ctx.font = "bold 20px monospace";
                    ctx.fillText("⚡", screen.x-8, screen.y-10);
                    if(!this.charged){
                        ctx.fillStyle = "#aa44ff";
                        ctx.fillRect(screen.x-25, screen.y-40, 50, 10);
                    } else {
                        ctx.fillStyle = "gold";
                        ctx.fillRect(screen.x-25, screen.y-40, 50, 10);
                    }
                } else {
                    ctx.fillStyle = "#555";
                    ctx.fillRect(screen.x-10, screen.y-30, 20, 50);
                    ctx.fillStyle = "#cc6600";
                    ctx.fillRect(screen.x-15, screen.y-45, 30, 15);
                }
            }
        }
        
        class Orb {
            constructor(x,y){
                this.x=x; this.y=y; this.life=120;
            }
            update(){ this.life--; return this.life>0; }
            draw(ctx, camera){
                let screen = {x: this.x - camera.x, y: this.y - camera.y};
                ctx.fillStyle = `rgba(255,200,100,${this.life/120})`;
                ctx.beginPath();
                ctx.arc(screen.x, screen.y, 8, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        class Game {
            constructor(){
                this.mapWidth = 4000;
                this.mapHeight = 3000;
                this.player = new Player(200,200);
                this.amigo = new Amigo(300,250);
                this.lamps = [
                    new LampPost(600,500), new LampPost(1200,900), new LampPost(2100,1500),
                    new LampPost(3600,2500, true) // будка у офиса
                ];
                this.orbs = [];
                this.camera = {x:0, y:0};
                this.level = 1; // 1 - город, 2 - офис
                this.showMessage = "";
                this.messageTimer = 0;
                this.officeDoorOpen = false;
                this.buttons = []; // для офиса
                this.buttonOrder = [];
                this.floppyTaken = false;
                this.duelActive = false;
                this.duelScore = 0;
                this.duelBarPos = 150;
                this.duelBarDir = 1;
                this.duelZone = {min:120, max:180};
            }
            
            showMsg(txt, duration=100){
                this.showMessage = txt;
                this.messageTimer = duration;
                messageDiv.innerText = txt;
                messageDiv.style.display = "block";
            }
            
            update(){
                if(this.messageTimer > 0){
                    this.messageTimer--;
                    if(this.messageTimer===0) messageDiv.style.display="none";
                }
                if(this.duelActive){
                    this.updateDuel();
                    return;
                }
                if(this.level === 1){
                    let alive = this.player.update();
                    if(!alive){
                        this.showMsg("⚡ РАЗРЯДКА! Игра перезапущена ⚡", 150);
                        setTimeout(()=> location.reload(), 1500);
                        return;
                    }
                    this.amigo.update();
                    // проверка зарядки у столбов
                    for(let l of this.lamps){
                        let dist = Math.hypot(this.player.x - l.x, this.player.y - l.y);
                        if(dist < 50){
                            if(l.isSpecial && !l.charged && this.level===1){
                                l.charged = true;
                                this.player.megaCharge = true;
                                this.player.battery = 999;
                                this.showMsg("💥 MEGA CHARGE! Пушка перезаряжена! 💥", 120);
                                // показываем comic8
                                this.showComicInterlude(8);
                            } else if(!l.isSpecial && !this.player.megaCharge){
                                this.player.battery = Math.min(this.player.maxBattery, this.player.battery+30);
                                this.showMsg("🔋 Зарядка...", 20);
                            }
                        }
                    }
                    // проверка приближения к офису без зарядки
                    let officeDist = Math.hypot(this.player.x - 3800, this.player.y - 2600);
                    if(officeDist < 150 && !this.player.megaCharge){
                        this.showMsg("⚠️ Нужно зарядить пушку у будки! ⚠️", 80);
                        this.player.x = 3600; this.player.y = 2500;
                    }
                    if(this.amigo.caught && !this.duelActive){
                        this.level = 2;
                        this.initOfficeLevel();
                    }
                    // стрельба и шарики
                    for(let i=0;i<this.orbs.length;i++){
                        if(!this.orbs[i].update()) this.orbs.splice(i,1);
                    }
                } else if(this.level === 2){
                    this.updateOffice();
                }
                // камера
                this.camera.x = this.player.x - canvas.width/2;
                this.camera.y = this.player.y - canvas.height/2;
                this.camera.x = Math.max(0, Math.min(this.mapWidth-canvas.width, this.camera.x));
                this.camera.y = Math.max(0, Math.min(this.mapHeight-canvas.height, this.camera.y));
            }
            
            showComicInterlude(num){
                comicContainer.style.display = 'flex';
                canvas.style.display = 'none';
                messageDiv.style.display = 'none';
                comicImg.src = `comic${num}.png`;
                let btn = document.createElement('button');
                btn.innerText = "Продолжить →";
                btn.style.marginTop = "20px";
                btn.onclick = () => {
                    comicContainer.style.display = 'none';
                    canvas.style.display = 'block';
                    messageDiv.style.display = 'block';
                    btn.remove();
                };
                comicContainer.appendChild(btn);
            }
            
            initOfficeLevel(){
                this.mapWidth = 2400;
                this.mapHeight = 1800;
                this.player.x = 200;
                this.player.y = 1600;
                this.player.battery = 999;
                this.officeDoorOpen = false;
                this.floppyTaken = false;
                this.buttons = [
                    {x:800, y:600, color:"red", pressed:false, order:0},
                    {x:1100, y:600, color:"blue", pressed:false, order:1},
                    {x:1400, y:600, color:"yellow", pressed:false, order:2}
                ];
                this.buttonOrder = [];
                this.showMsg("Найди комнату с кнопками!", 100);
            }
            
            updateOffice(){
                this.player.update();
                // проверка кнопок
                for(let btn of this.buttons){
                    let dist = Math.hypot(this.player.x - btn.x, this.player.y - btn.y);
                    if(dist < 50 && !btn.pressed){
                        btn.pressed = true;
                        this.buttonOrder.push(btn.color);
                        // проверка последовательности
                        let correct = ["red","blue","yellow"];
                        let ok = true;
                        for(let i=0;i<this.buttonOrder.length;i++){
                            if(this.buttonOrder[i] !== correct[i]) ok=false;
                        }
                        if(!ok){
                            for(let b of this.buttons) b.pressed=false;
                            this.buttonOrder = [];
                            this.showMsg("❌ Неправильно! Начни заново", 60);
                        } else if(this.buttonOrder.length === 3){
                            this.officeDoorOpen = true;
                            this.showMsg("🚪 Дверь открылась! Иди к столу с флешкой", 100);
                        }
                        break;
                    }
                }
                // флешка
                let flashDrivePos = {x:1800, y:800};
                let distToFlash = Math.hypot(this.player.x - flashDrivePos.x, this.player.y - flashDrivePos.y);
                if(!this.floppyTaken && this.officeDoorOpen && distToFlash < 40){
                    this.showMsg("📀 Нажми [E] / кнопку ВЗЯТЬ", 10);
                    if((typeof window.triggerPickup !== 'undefined' && window.triggerPickup) || (typeof takeFloppy !== 'undefined' && takeFloppy)){
                        this.floppyTaken = true;
                        this.startDuel();
                    }
                }
                // рисовать дверь
            }
            
            startDuel(){
                this.duelActive = true;
                this.duelScore = 0;
                this.showMsg("Дуэль! Попади 5 раз подряд в центр!", 200);
            }
            
            updateDuel(){
                this.duelBarPos += this.duelBarDir * 5;
                if(this.duelBarPos > 290) { this.duelBarPos = 290; this.duelBarDir = -1; }
                if(this.duelBarPos < 10) { this.duelBarPos = 10; this.duelBarDir = 1; }
            }
            
            duelShoot(){
                if(!this.duelActive) return false;
                let inZone = (this.duelBarPos >= 120 && this.duelBarPos <= 180);
                if(inZone){
                    this.duelScore++;
                    if(this.duelScore >= 5){
                        this.duelActive = false;
                        this.showComicInterlude(9);
                        setTimeout(()=> location.reload(), 3000);
                    } else {
                        this.showMsg(`🎯 Попадание! ${this.duelScore}/5`, 40);
                    }
                } else {
                    this.duelScore = 0;
                    this.showMsg("❌ Промах! Начни заново", 40);
                }
                return true;
            }
            
            draw(ctx){
                ctx.fillStyle = "#2a5a2a";
                ctx.fillRect(0,0,canvas.width,canvas.height);
                // препятствия (дома - простые квадраты)
                for(let i=0;i<30;i++){
                    ctx.fillStyle = "#5a3a2a";
                    ctx.fillRect(300+i*150 - this.camera.x, 400 - this.camera.y, 80,80);
                }
                for(let l of this.lamps) l.draw(ctx, this.camera);
                for(let o of this.orbs) o.draw(ctx, this.camera);
                this.amigo.draw(ctx, this.camera);
                this.player.draw(ctx, this.camera);
                if(this.level===2){
                    for(let btn of this.buttons){
                        let screen = {x: btn.x - this.camera.x, y: btn.y - this.camera.y};
                        ctx.fillStyle = btn.color;
                        ctx.beginPath();
                        ctx.arc(screen.x, screen.y, 20, 0, Math.PI*2);
                        ctx.fill();
                        if(btn.pressed){
                            ctx.fillStyle = "gold";
                            ctx.beginPath();
                            ctx.arc(screen.x, screen.y, 28, 0, Math.PI*2);
                            ctx.fill();
                        }
                    }
                    if(this.officeDoorOpen){
                        ctx.fillStyle = "#886644";
                        ctx.fillRect(1700 - this.camera.x, 700 - this.camera.y, 80, 120);
                        ctx.fillStyle = "#ffaa66";
                        ctx.fillRect(1750 - this.camera.x, 750 - this.camera.y, 30, 30);
                    }
                    if(!this.floppyTaken && this.officeDoorOpen){
                        ctx.fillStyle = "silver";
                        ctx.fillRect(1800 - this.camera.x, 800 - this.camera.y, 20, 15);
                    }
                }
                // шкала батареи
                ctx.fillStyle = "#333";
                ctx.fillRect(20,20,220,25);
                let percent = this.player.megaCharge ? 1 : this.player.battery/100;
                ctx.fillStyle = this.player.megaCharge ? "gold" : (this.player.battery<30 ? "red" : "lime");
                ctx.fillRect(20,20,220*percent,25);
                ctx.fillStyle = "white";
                ctx.font = "bold 16px monospace";
                ctx.fillText(this.player.megaCharge ? "⚡ MEGA CHARGE ⚡" : "ЗАРЯД", 25,42);
                
                // дуэль полоска
                if(this.duelActive){
                    ctx.fillStyle = "black";
                    ctx.fillRect(canvas.width/2-150, canvas.height-100, 300, 40);
                    ctx.fillStyle = "gold";
                    ctx.fillRect(canvas.width/2-150+this.duelBarPos-10, canvas.height-100, 20, 40);
                    ctx.fillStyle = "#00ff00";
                    ctx.fillRect(canvas.width/2-30, canvas.height-100, 60, 40);
                    ctx.fillStyle = "white";
                    ctx.fillText("👉 ЦЕЛЬ 👈", canvas.width/2-40, canvas.height-110);
                }
            }
        }
        
        // управление
        let keys = { ArrowUp:false, ArrowDown:false, ArrowLeft:false, ArrowRight:false, w:false, s:false, a:false, d:false };
        function handleInput(){
            if(!game) return;
            let dx=0, dy=0;
            if(keys.ArrowUp||keys.w) dy-=1;
            if(keys.ArrowDown||keys.s) dy+=1;
            if(keys.ArrowLeft||keys.a) dx-=1;
            if(keys.ArrowRight||keys.d) dx+=1;
            let len = Math.hypot(dx,dy);
            if(len>0){ dx/=len; dy/=len; }
            game.player.dir = {x:dx, y:dy};
        }
        
        window.addEventListener('keydown', (e)=>{
            let k = e.key;
            if(keys.hasOwnProperty(k)) keys[k]=true;
            if(k===' ' || k==='Space'){
                e.preventDefault();
                if(game && game.duelActive) game.duelShoot();
                else if(game && game.player.shoot()){
                    let angle = Math.atan2(game.player.dir.y, game.player.dir.x);
                    let hit = Math.hypot(game.player.x - game.amigo.x, game.player.y - game.amigo.y) < 70;
                    if(hit && !game.amigo.caught){
                        game.amigo.hit();
                        game.orbs.push(new Orb(game.amigo.x, game.amigo.y));
                        game.showMsg("🎩 Шарик упал! Следуй за ними!", 40);
                    }
                }
            }
            if(k==='e' || k==='E'){
                if(game && game.level===2 && !game.floppyTaken && game.officeDoorOpen){
                    let flashPos = {x:1800,y:800};
                    let dist = Math.hypot(game.player.x - flashPos.x, game.player.y - flashPos.y);
                    if(dist<50){
                        game.floppyTaken=true;
                        game.startDuel();
                    }
                }
            }
        });
        window.addEventListener('keyup', (e)=>{ if(keys.hasOwnProperty(e.key)) keys[e.key]=false; });
        
        // телефон: джойстик статический
        let touchActive = false, touchDir = {x:0,y:0};
        canvas.addEventListener('touchstart', (e)=>{
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width/rect.width;
            let scaleY = canvas.height/rect.height;
            for(let t of e.touches){
                let canvasX = (t.clientX - rect.left)*scaleX;
                let canvasY = (t.clientY - rect.top)*scaleY;
                if(canvasX < 200 && canvasY > canvas.height-200){
                    touchActive = true;
                    let dx = canvasX - 100;
                    let dy = canvasY - (canvas.height-150);
                    let len = Math.hypot(dx,dy);
                    if(len>0){ touchDir.x = dx/len; touchDir.y = dy/len; }
                    else touchDir = {x:0,y:0};
                }
                if(canvasX > canvas.width-100 && canvasY > canvas.height-100){
                    if(game && game.duelActive) game.duelShoot();
                    else if(game && game.player.shoot()){
                        let angle = Math.atan2(game.player.dir.y, game.player.dir.x);
                        let hit = Math.hypot(game.player.x - game.amigo.x, game.player.y - game.amigo.y) < 70;
                        if(hit && !game.amigo.caught){
                            game.amigo.hit();
                            game.orbs.push(new Orb(game.amigo.x, game.amigo.y));
                        }
                    }
                }
            }
        });
        canvas.addEventListener('touchmove', (e)=>{
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width/rect.width;
            let scaleY = canvas.height/rect.height;
            for(let t of e.touches){
                let canvasX = (t.clientX - rect.left)*scaleX;
                let canvasY = (t.clientY - rect.top)*scaleY;
                if(touchActive){
                    let dx = canvasX - 100;
                    let dy = canvasY - (canvas.height-150);
                    let len = Math.hypot(dx,dy);
                    if(len>0){ touchDir.x = dx/len; touchDir.y = dy/len; }
                    else touchDir = {x:0,y:0};
                }
            }
        });
        canvas.addEventListener('touchend', ()=>{ touchActive=false; touchDir={x:0,y:0}; });
        
        function gameLoop(){
            if(!game) return;
            handleInput();
            if(touchActive){
                game.player.dir = touchDir;
            }
            game.update();
            game.draw(ctx);
            requestAnimationFrame(gameLoop);
        }
        
        function initGame(){
            game = new Game();
            gameLoop();
        }
    })();
</script>
</body>
</html>
