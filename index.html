<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Among Us 2D Top-Down Бродилка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a2f2a 0%, #05201c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Press Start 2P', 'Courier New', monospace;
            touch-action: none; /* для мобильных устройств */
        }

        .game-container {
            padding: 20px;
            border-radius: 48px;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            cursor: none;
            background-color: #1f3e3a;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 18px;
            margin-bottom: 8px;
            background: #111c1aee;
            backdrop-filter: blur(4px);
            padding: 12px 24px;
            border-radius: 60px;
            color: #f5f9ff;
            text-shadow: 2px 2px 0 #2d4a44;
            font-weight: bold;
        }

        .score-box, .hint-box {
            background: #00000066;
            padding: 6px 18px;
            border-radius: 32px;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .score-box span, .hint-box span {
            color: #ffd966;
            font-size: 1.7rem;
            font-weight: bold;
            margin-right: 8px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        button {
            background: #2c3e35;
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 8px 22px;
            border-radius: 60px;
            font-family: monospace;
            cursor: pointer;
            box-shadow: 0 4px 0 #0f2a24;
            transition: 0.07s linear;
            backdrop-filter: blur(4px);
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0f2a24;
        }

        .mobile-stick {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 10px;
        }

        @media (max-width: 700px) {
            .score-box, .hint-box { font-size: 0.9rem; padding: 4px 12px; }
            .score-box span, .hint-box span { font-size: 1.3rem; }
            button { font-size: 1.2rem; padding: 6px 14px; }
        }

        .restart-btn {
            background: #b3421d;
            box-shadow: 0 4px 0 #632a10;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="600"></canvas>
        <div class="info-panel">
            <div class="score-box"><span>🍩</span> Донаты: <span id="scoreValue">0</span></div>
            <div class="hint-box"><span>🎮</span> WASD / стрелки | Собери 10 пончиков</div>
        </div>
        <div class="controls">
            <button id="resetGameBtn" class="restart-btn">🔄 Новая игра</button>
        </div>
        <div class="mobile-stick" id="mobileControls" style="display: none;">
            <button id="btnUp">▲ Вверх</button>
            <button id="btnLeft">◀ Лев</button>
            <button id="btnDown">▼ Вниз</button>
            <button id="btnRight">Прав ▶</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Размеры мира (топдаун камера следует за игроком, но мир фиксирован)
        // Мир 2400x1800, камера 900x600 (центрируется на игроке)
        const WORLD_WIDTH = 2400;
        const WORLD_HEIGHT = 1800;
        
        // Игрок (Among As стиль - красный/синий комбинезон)
        let player = {
            x: WORLD_WIDTH/2,
            y: WORLD_HEIGHT/2,
            radius: 24,      // размер для коллизий
            speed: 4.8,
            angle: 0,        // угол поворота (для взгляда/задника)
            color: "#D32F2F" // красный crewmate
        };
        
        let donuts = [];      // массив пончиков {x, y, radius, collected}
        let score = 0;
        let gameRunning = true;
        
        // Враги (имитаторы - среди нас? простые препятствия - серые "импостеры")
        let enemies = [];
        
        // Стены/границы - просто границы мира + несколько декоративных препятствий (колонны/оборудование)
        let walls = [];
        
        // Управление
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, s: false, a: false, d: false
        };
        
        // камера
        let camera = { x: 0, y: 0 };
        
        // ---------- ИНИЦИАЛИЗАЦИЯ МИРА ----------
        function initGame() {
            // Сброс игрока
            player.x = WORLD_WIDTH/2;
            player.y = WORLD_HEIGHT/2;
            player.speed = 4.8;
            score = 0;
            updateScoreUI();
            gameRunning = true;
            
            // Генерация пончиков (20 штук)
            donuts = [];
            for(let i = 0; i < 22; i++) {
                let placed = false;
                let attempts = 0;
                while(!placed && attempts < 80) {
                    let randX = 60 + Math.random() * (WORLD_WIDTH - 120);
                    let randY = 60 + Math.random() * (WORLD_HEIGHT - 120);
                    // Не на игроке и не слишком близко к врагам/стенам - но упростим
                    let distToPlayer = Math.hypot(randX - player.x, randY - player.y);
                    if(distToPlayer > 70) {
                        let collides = false;
                        for(let w of walls) {
                            if(Math.hypot(randX - w.x, randY - w.y) < w.radius + 22) collides = true;
                        }
                        for(let e of enemies) {
                            if(Math.hypot(randX - e.x, randY - e.y) < e.radius + 28) collides = true;
                        }
                        if(!collides) {
                            donuts.push({ x: randX, y: randY, radius: 12, collected: false });
                            placed = true;
                        }
                    }
                    attempts++;
                }
                if(!placed) {
                    donuts.push({ x: 200 + i*70, y: 300 + (i%5)*80, radius: 12, collected: false });
                }
            }
            
            // Враги (бродят, при касании отбрасывают и снимают очки, но не смертельно)
            enemies = [
                { x: 800, y: 500, radius: 26, speed: 1.2, angle: 0, color: "#6c8b7c", name: "imposter" },
                { x: 1500, y: 1200, radius: 28, speed: 1.4, angle: 0.5, color: "#5f7b6e", name: "imposter" },
                { x: 1900, y: 400, radius: 24, speed: 1.5, angle: 2.2, color: "#4f6a5e", name: "imposter" },
                { x: 500, y: 1400, radius: 27, speed: 1.1, angle: 3.9, color: "#708d7c", name: "imposter" },
                { x: 2100, y: 1600, radius: 25, speed: 1.3, angle: 1.7, color: "#698b78", name: "imposter" }
            ];
            
            // Стены/декор (препятствия)
            walls = [];
            // границы - обрабатываются отдельно, но добавим колонны и мебель в стиле "Скилд"
            const obstacles = [
                { x: 400, y: 300, radius: 38 }, { x: 850, y: 720, radius: 45 }, { x: 1300, y: 250, radius: 40 },
                { x: 2000, y: 500, radius: 48 }, { x: 1750, y: 1300, radius: 42 }, { x: 620, y: 1600, radius: 44 },
                { x: 1050, y: 1550, radius: 35 }, { x: 2250, y: 1100, radius: 50 }, { x: 300, y: 950, radius: 38 },
                { x: 1480, y: 900, radius: 32 }, { x: 1900, y: 1700, radius: 36 }, { x: 70, y: 1720, radius: 42 },
                { x: 2330, y: 80, radius: 44 }
            ];
            for(let obs of obstacles) {
                walls.push({ x: obs.x, y: obs.y, radius: obs.radius });
            }
        }
        
        // Движение врагов (патруль)
        function moveEnemies() {
            for(let e of enemies) {
                // простое блуждание с изменением направления
                e.angle += (Math.random() - 0.5) * 0.25;
                let dx = Math.cos(e.angle) * e.speed;
                let dy = Math.sin(e.angle) * e.speed;
                let newX = e.x + dx;
                let newY = e.y + dy;
                // границы мира
                if(newX > e.radius + 20 && newX < WORLD_WIDTH - e.radius - 20) e.x = newX;
                if(newY > e.radius + 20 && newY < WORLD_HEIGHT - e.radius - 20) e.y = newY;
                // отталкивание от стен
                for(let w of walls) {
                    let dist = Math.hypot(e.x - w.x, e.y - w.y);
                    let minDist = e.radius + w.radius;
                    if(dist < minDist) {
                        let angle = Math.atan2(e.y - w.y, e.x - w.x);
                        let overlap = minDist - dist;
                        e.x += Math.cos(angle) * overlap;
                        e.y += Math.sin(angle) * overlap;
                        // немного меняем угол
                        e.angle += (Math.random() - 0.5) * 1.2;
                    }
                }
                // отталкивание от других врагов
                for(let other of enemies) {
                    if(other === e) continue;
                    let distE = Math.hypot(e.x - other.x, e.y - other.y);
                    let minE = e.radius + other.radius;
                    if(distE < minE) {
                        let angleE = Math.atan2(e.y - other.y, e.x - other.x);
                        let push = minE - distE;
                        e.x += Math.cos(angleE) * push * 0.6;
                        e.y += Math.sin(angleE) * push * 0.6;
                    }
                }
                // небольшая корректировка границ повторно
                e.x = Math.min(Math.max(e.x, e.radius + 10), WORLD_WIDTH - e.radius - 10);
                e.y = Math.min(Math.max(e.y, e.radius + 10), WORLD_HEIGHT - e.radius - 10);
            }
        }
        
        // Обновление игрока, столкновения, сбор пончиков
        function updatePlayer() {
            if(!gameRunning) return;
            let moveX = 0, moveY = 0;
            if(keys.ArrowUp || keys.w) moveY -= 1;
            if(keys.ArrowDown || keys.s) moveY += 1;
            if(keys.ArrowLeft || keys.a) moveX -= 1;
            if(keys.ArrowRight || keys.d) moveX += 1;
            
            if(moveX !== 0 || moveY !== 0) {
                let len = Math.hypot(moveX, moveY);
                moveX = moveX / len;
                moveY = moveY / len;
                // угол для визуального поворота (глазок)
                player.angle = Math.atan2(moveY, moveX);
            }
            
            let newX = player.x + moveX * player.speed;
            let newY = player.y + moveY * player.speed;
            
            // границы мира
            if(newX > player.radius + 12 && newX < WORLD_WIDTH - player.radius - 12) player.x = newX;
            if(newY > player.radius + 12 && newY < WORLD_HEIGHT - player.radius - 12) player.y = newY;
            
            // столкновения со стенами
            for(let w of walls) {
                let dist = Math.hypot(player.x - w.x, player.y - w.y);
                let minDist = player.radius + w.radius;
                if(dist < minDist) {
                    let angle = Math.atan2(player.y - w.y, player.x - w.x);
                    let overlap = minDist - dist;
                    player.x += Math.cos(angle) * overlap;
                    player.y += Math.sin(angle) * overlap;
                }
            }
            
            // столкновение с врагами - отбрасывание и потеря очка
            for(let e of enemies) {
                let distToEnemy = Math.hypot(player.x - e.x, player.y - e.y);
                let threshold = player.radius + e.radius;
                if(distToEnemy < threshold) {
                    // отброс назад
                    let angleAway = Math.atan2(player.y - e.y, player.x - e.x);
                    let pushForce = 22;
                    player.x += Math.cos(angleAway) * pushForce;
                    player.y += Math.sin(angleAway) * pushForce;
                    // штраф: теряем одно очко, но не ниже нуля
                    if(score > 0) {
                        score = Math.max(0, score - 1);
                        updateScoreUI();
                    } else if(score === 0) {
                        // легкий визуальный эффект
                    }
                    // дополнительное смещение границ
                    player.x = Math.min(Math.max(player.x, player.radius + 8), WORLD_WIDTH - player.radius - 8);
                    player.y = Math.min(Math.max(player.y, player.radius + 8), WORLD_HEIGHT - player.radius - 8);
                    break;
                }
            }
            
            // сбор пончиков
            for(let i = 0; i < donuts.length; i++) {
                let d = donuts[i];
                if(!d.collected) {
                    let distDonut = Math.hypot(player.x - d.x, player.y - d.y);
                    if(distDonut < player.radius + d.radius) {
                        d.collected = true;
                        score++;
                        updateScoreUI();
                        // проверка победы
                        if(score >= 10) {
                            gameRunning = false;
                        }
                    }
                }
            }
        }
        
        function updateScoreUI() {
            document.getElementById('scoreValue').innerText = score;
        }
        
        // Камера следует за игроком
        function updateCamera() {
            let targetCamX = player.x - canvas.width/2;
            let targetCamY = player.y - canvas.height/2;
            targetCamX = Math.min(Math.max(targetCamX, 0), WORLD_WIDTH - canvas.width);
            targetCamY = Math.min(Math.max(targetCamY, 0), WORLD_HEIGHT - canvas.height);
            camera.x = targetCamX;
            camera.y = targetCamY;
        }
        
        // ---------- ОТРИСОВКА (Among As стиль) ----------
        function drawBackground() {
            // пол
            ctx.fillStyle = "#2d554b";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // клетчатый паттерн пола (космос/корабль)
            ctx.strokeStyle = "#3f6d60";
            ctx.lineWidth = 1;
            let step = 50;
            let startX = Math.floor(camera.x / step) * step - camera.x;
            let startY = Math.floor(camera.y / step) * step - camera.y;
            for(let x = startX; x < canvas.width; x += step) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for(let y = startY; y < canvas.height; y += step) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }
        
        function drawWalls() {
            for(let w of walls) {
                let screenX = w.x - camera.x;
                let screenY = w.y - camera.y;
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = "black";
                ctx.beginPath();
                ctx.arc(screenX, screenY, w.radius, 0, Math.PI*2);
                ctx.fillStyle = "#457061";
                ctx.fill();
                ctx.fillStyle = "#2c4e43";
                ctx.beginPath();
                ctx.arc(screenX-3, screenY-3, w.radius-6, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#deb887";
                ctx.beginPath();
                ctx.arc(screenX, screenY, w.radius-10, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        function drawDonuts() {
            for(let d of donuts) {
                if(d.collected) continue;
                let screenX = d.x - camera.x;
                let screenY = d.y - camera.y;
                ctx.save();
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(screenX, screenY, d.radius, 0, Math.PI*2);
                ctx.fillStyle = "#f7b05e";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(screenX, screenY, d.radius-4, 0, Math.PI*2);
                ctx.fillStyle = "#b5651e";
                ctx.fill();
                ctx.fillStyle = "#ffd58c";
                for(let i=0;i<8;i++) {
                    let angleSpr = i * Math.PI*2/8;
                    let sx = screenX + Math.cos(angleSpr) * (d.radius-3);
                    let sy = screenY + Math.sin(angleSpr) * (d.radius-3);
                    ctx.beginPath();
                    ctx.arc(sx, sy, 2.5, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }
        
        // среди нас стиль - герой с рюкзаком и забралом
        function drawPlayer() {
            let px = player.x - camera.x;
            let py = player.y - camera.y;
            ctx.save();
            ctx.shadowBlur = 6;
            // тело
            ctx.beginPath();
            ctx.ellipse(px, py, player.radius, player.radius*1.1, 0, 0, Math.PI*2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.fillStyle = "#b71c1c";
            ctx.beginPath();
            ctx.ellipse(px-3, py-3, player.radius-7, player.radius-5, 0, 0, Math.PI*2);
            ctx.fill();
            // рюкзак
            ctx.fillStyle = "#9a2e2e";
            ctx.beginPath();
            ctx.rect(px+12, py-8, 12, 22);
            ctx.fill();
            // шлем/стекло
            ctx.beginPath();
            ctx.arc(px-2, py-9, 12, 0, Math.PI*2);
            ctx.fillStyle = "#c0e0ffcc";
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(px-7, py-13, 3, 0, Math.PI*2);
            ctx.fill();
            // глазок (направление)
            let eyeX = px - 3 + Math.cos(player.angle) * 6;
            let eyeY = py - 10 + Math.sin(player.angle) * 5;
            ctx.fillStyle = "#000000";
            ctx.beginPath();
            ctx.arc(eyeX, eyeY, 2.5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(eyeX-1, eyeY-1, 1, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        
        function drawEnemies() {
            for(let e of enemies) {
                let ex = e.x - camera.x;
                let ey = e.y - camera.y;
                ctx.save();
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.ellipse(ex, ey, e.radius, e.radius*0.9, 0, 0, Math.PI*2);
                ctx.fillStyle = e.color;
                ctx.fill();
                ctx.fillStyle = "#3e5a4f";
                ctx.beginPath();
                ctx.ellipse(ex-3, ey-2, e.radius-8, e.radius-7, 0, 0, Math.PI*2);
                ctx.fill();
                // злобные глаза
                ctx.fillStyle = "#ffcc88";
                ctx.beginPath();
                ctx.arc(ex-8, ey-7, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#aa2e1e";
                ctx.beginPath();
                ctx.arc(ex+4, ey-8, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "black";
                ctx.beginPath();
                ctx.arc(ex-9, ey-9, 2, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex+3, ey-10, 2, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        function drawUIeffects() {
            if(!gameRunning && score >= 10) {
                ctx.font = "bold 42 monospace";
                ctx.fillStyle = "#ffec80";
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                ctx.fillText("✨ ПОБЕДА! ✨", canvas.width/2, canvas.height/2 - 50);
                ctx.font = "24px monospace";
                ctx.fillStyle = "#cae3d6";
                ctx.fillText("Нажми «Новая игра»", canvas.width/2, canvas.height/2 + 40);
            } else if(!gameRunning && score < 10) {
                // не случится, но на всякий
            }
            // счет на экране в углу
            ctx.font = "bold 22 'Segoe UI'";
            ctx.fillStyle = "#f9f3cf";
            ctx.shadowBlur = 2;
            ctx.textAlign = "left";
            ctx.fillText("🍩 x"+score, 18, 48);
        }
        
        // цикл отрисовки и обновления
        function gameLoop() {
            if(gameRunning) {
                moveEnemies();
                updatePlayer();
                updateCamera();
            }
            drawBackground();
            drawWalls();
            drawDonuts();
            drawEnemies();
            drawPlayer();
            drawUIeffects();
            requestAnimationFrame(gameLoop);
        }
        
        // обработка клавиш
        function handleKeyDown(e) {
            let key = e.key;
            if(keys.hasOwnProperty(key)) keys[key] = true;
            // стрелки, wasd
            if(key === 'ArrowUp') keys.ArrowUp = true;
            if(key === 'ArrowDown') keys.ArrowDown = true;
            if(key === 'ArrowLeft') keys.ArrowLeft = true;
            if(key === 'ArrowRight') keys.ArrowRight = true;
            if(key === 'w') keys.w = true;
            if(key === 's') keys.s = true;
            if(key === 'a') keys.a = true;
            if(key === 'd') keys.d = true;
        }
        
        function handleKeyUp(e) {
            let key = e.key;
            if(keys.hasOwnProperty(key)) keys[key] = false;
            if(key === 'ArrowUp') keys.ArrowUp = false;
            if(key === 'ArrowDown') keys.ArrowDown = false;
            if(key === 'ArrowLeft') keys.ArrowLeft = false;
            if(key === 'ArrowRight') keys.ArrowRight = false;
            if(key === 'w') keys.w = false;
            if(key === 's') keys.s = false;
            if(key === 'a') keys.a = false;
            if(key === 'd') keys.d = false;
        }
        
        function restartGame() {
            initGame();
            gameRunning = true;
            updateScoreUI();
        }
        
        // мобильное управление
        function setupMobile() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const mobileDiv = document.getElementById('mobileControls');
            if(isMobile) {
                mobileDiv.style.display = 'flex';
                document.getElementById('btnUp').addEventListener('click', () => { keys.ArrowUp = true; setTimeout(()=> keys.ArrowUp=false, 120); });
                document.getElementById('btnDown').addEventListener('click', () => { keys.ArrowDown = true; setTimeout(()=> keys.ArrowDown=false, 120); });
                document.getElementById('btnLeft').addEventListener('click', () => { keys.ArrowLeft = true; setTimeout(()=> keys.ArrowLeft=false, 120); });
                document.getElementById('btnRight').addEventListener('click', () => { keys.ArrowRight = true; setTimeout(()=> keys.ArrowRight=false, 120); });
                // также поддержка wasd через кнопки, продублируем
                document.getElementById('btnUp').addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowUp = true; });
                document.getElementById('btnUp').addEventListener('touchend', () => { keys.ArrowUp = false; });
                document.getElementById('btnDown').addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowDown = true; });
                document.getElementById('btnDown').addEventListener('touchend', () => { keys.ArrowDown = false; });
                document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowLeft = true; });
                document.getElementById('btnLeft').addEventListener('touchend', () => { keys.ArrowLeft = false; });
                document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowRight = true; });
                document.getElementById('btnRight').addEventListener('touchend', () => { keys.ArrowRight = false; });
            } else {
                mobileDiv.style.display = 'none';
            }
        }
        
        // инициализация
        window.addEventListener('load', () => {
            initGame();
            updateCamera();
            setupMobile();
            document.getElementById('resetGameBtn').addEventListener('click', () => { restartGame(); });
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            gameLoop();
        });
    })();
</script>
</body>
</html>
